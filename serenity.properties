serenity.project.name=Desafio BancaEcuador - E2E Serenity Screenplay
webdriver.driver=chrome
headless.mode=true
chrome.switches=--headless=new,--disable-gpu,--window-size=1366,768,--no-sandbox,--disable-dev-shm-usage
